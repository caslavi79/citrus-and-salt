<style>
  :root {

  }

  html { min-height: 100%; }
  html::after {
    content: '';

  body::before {

function Burger({ openChooser }) {
  const [open, setOpen] = useState(false);
  const btnRef = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') close(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open]);
  const close = () => { setOpen(false); btnRef.current?.focus(); };
  return (
    <>
      <button
        ref={btnRef}
        className={`burger ${open ? 'open' : ''}`}
        aria-label={open ? 'Close menu' : 'Open menu'}
        aria-expanded={open}
        aria-controls="site-menu"
        onClick={() => setOpen(o => !o)}
      >
        <span /><span /><span />
      </button>
      <nav id="site-menu" className={`menu ${open ? 'open' : ''}`} aria-label="Site" aria-hidden={!open} {...(open ? {} : { inert: '' })}>

const CHOOSER_CONFIG = {
  phone: {
    title: 'Reach us',
    options: [
      { label: 'Call',  href: 'tel:+18322854598' },
      { label: 'Text',  href: 'sms:+18322854598' },
    ],
  },
  dir: {
    title: 'Get directions',
    options: [
      { label: 'Apple Maps',  href: 'https://maps.apple.com/?q=121+N+Main+St+Bryan+TX', external: true },
      { label: 'Google Maps', href: 'https://maps.google.com/?q=121+N+Main+St+Bryan+TX', external: true },
    ],
  },
};

function Chooser({ kind, onClose }) {
  const cardRef = useRef(null);
  const prevFocusRef = useRef(null);

  useEffect(() => {
    if (!kind) return;
    prevFocusRef.current = document.activeElement;
    const focusables = () => cardRef.current?.querySelectorAll('a, button');
    const focusFirst = () => { const f = focusables(); if (f && f[0]) f[0].focus(); };
    const onKey = (e) => {
      if (e.key === 'Escape') { onClose(); return; }
      if (e.key !== 'Tab') return;
      const f = focusables();
      if (!f || !f.length) return;
      const first = f[0], last = f[f.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    };
    document.addEventListener('keydown', onKey);
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    setTimeout(focusFirst, 10);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.body.style.overflow = prev;
      prevFocusRef.current?.focus?.();
    };
  }, [kind, onClose]);

  if (!kind) return null;
  const cfg = CHOOSER_CONFIG[kind];
  const titleId = `chooser-title-${kind}`;

  return (
    <div className="chooser" onClick={onClose} role="dialog" aria-modal="true" aria-labelledby={titleId}>
      <div className="chooser__card" onClick={(e) => e.stopPropagation()} ref={cardRef}>
        <div className="chooser__title" id={titleId}>{cfg.title}</div>
        <div className="chooser__opts">
          {cfg.options.map((o) => (
            <a
              key={o.label}
              href={o.href}
              {...(o.external ? { target: '_blank', rel: 'noreferrer' } : {})}
              className="chooser__opt"
              onClick={onClose}
            >
              {o.label}
            </a>
          ))}
        </div>
        <button className="chooser__cancel" onClick={onClose}>Cancel</button>
      </div>
    </div>
  );
}

function App() {
  const [chooserKind, setChooserKind] = useState(null);
  const openChooser = (kind) => setChooserKind(kind);
  const closeChooser = () => setChooserKind(null);

  // Re-scroll to URL hash after React mounts the sections.
  useEffect(() => {
    if (!window.location.hash) return;
    const id = decodeURIComponent(window.location.hash.slice(1));
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const el = document.getElementById(id);
      if (!el) return;
      const prev = document.documentElement.style.scrollBehavior;
      document.documentElement.style.scrollBehavior = 'auto';
      el.scrollIntoView({ block: 'start' });
      document.documentElement.style.scrollBehavior = prev;
    }));
  }, []);

  return (
    <>
      <Topbar />
      <Burger openChooser={openChooser} />
      <main id="main">
        <PageHero />
        <News />
        <FAQ />
      </main>
      <Foot />
      <Chooser kind={chooserKind} onClose={closeChooser} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
