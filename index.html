    <text x="60" y="92" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="7" fill="#C4E84A" letter-spacing="2">TEQUILA BAR</text>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --night:    #120C08;
    --night-2:  #1A1209;
    --ember:    #261A10;
    --plaster:  #EEDAB0;
    --bone:     #F5E9CF;
    --bone-dim: #A99372;
    --mustard:  #D4AA4E;
    --clay:     #B0523E;
    --pink:     #FF6A94;
    --cyan:     #29D4E8;
    --lime:     #C4E84A;

    --display: 'Fraunces', Georgia, serif;
    --script:  'Yellowtail', cursive;
    --body:    'Space Grotesk', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--night); color: var(--bone); font-family: var(--body); }
  html { min-height: 100%; }
  body {
    margin-top: -120px;
    padding-top: 120px;
    background:
      linear-gradient(180deg, #3a2410 0, #2a1a0d 70px, #1d1209 140px, transparent 220px),
      radial-gradient(1200px 900px at 70% -5%, rgba(176,82,62,0.16), transparent 55%),
      radial-gradient(1000px 700px at 5% 30%, rgba(212,170,78,0.10), transparent 55%),
      radial-gradient(900px 700px at 90% 80%, rgba(255,106,148,0.06), transparent 55%),
      var(--night);
    overflow-x: hidden;
  }
  body::before {
    content:""; position: fixed; inset:0; pointer-events:none; z-index: 100;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.75  0 0 0 0 0.45  0 0 0 0.09 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: .3; mix-blend-mode: overlay;
  }
  /* Solid opaque cap covering just the status-bar / safe-area at the top.
     Sits below the topbar (z-index 60) but above all page content, so nothing
     can scroll up into the status-bar region. */
  html::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: env(safe-area-inset-top);
    background: var(--night);
    z-index: 59;
    pointer-events: none;
  }
  a { color: inherit; text-decoration: none; }
  img { display:block; max-width:100%; }
  ::selection { background: var(--mustard); color: var(--night); }

  /* ————————————————————————————— SMALL NAV (mobile-first) */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 60;
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(14px + env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) 14px max(20px, env(safe-area-inset-left));
    font-family: var(--display); font-style: italic; font-size: 13px;
    color: var(--bone-dim);
  }
  .topbar::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #120C08 0%, #120C08 60%, rgba(18,12,8,0.96) 100%);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(212,170,78,0.18);
    opacity: 0;
    transition: opacity .28s ease-out;
    pointer-events: none;
    z-index: -1;
    will-change: opacity;
  }
  .topbar.is-scrolled::before { opacity: 1; }
  .topbar a:hover { color: var(--bone); }
  .topbar .brand { font-family: var(--script); font-size: 22px; color: var(--bone); font-style: normal; }
  .topbar .brand .p { color: var(--pink); }
  .topbar .brand .m { color: var(--mustard); }
  .topbar .links { display: none; gap: 26px; }
  .topbar .links a { white-space: nowrap; }
  @media (min-width: 760px) {
    .topbar { padding: 18px 36px; font-size: 14px; }
    .topbar .links { display: flex; }
  }

  /* ————————————————————————————— HERO: mobile-first, centered */
  .hero {
    position: relative;
    container-type: inline-size;
    padding: clamp(6.25rem, 17vw, 8.75rem) clamp(1rem, 4vw, 4rem) clamp(3.25rem, 9vw, 5rem);
    display: flex; flex-direction: column;
    align-items: center;
    text-align: center;
    gap: clamp(1.25rem, 4vw, 2rem);
    overflow: hidden;
  }
  @media (min-width: 960px) {
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(0, 1fr);
      grid-template-areas:
        "only sign"
        "h1 sign"
        "lede sign"
        "row sign";
      grid-template-rows: auto auto auto 1fr;
      column-gap: clamp(2rem, 5vw, 4rem);
      row-gap: clamp(1rem, 2.5vw, 2rem);
      align-items: start;
      text-align: left;
      min-height: 100vh;
    }
    .hero__only { grid-area: only; align-self: end; }
    .hero__h1 { grid-area: h1; }
    .hero__sign { grid-area: sign; align-self: center; }
    .hero__lede { grid-area: lede; }
    .hero__row { grid-area: row; align-self: start; }
  }

  .hero__only {
    display: none;
  }
  @media (min-width: 960px) {
    .hero__only {
      display: block;
      font-family: var(--script); color: var(--mustard);
      font-size: clamp(2.5rem, 4.75vw, 4.25rem); line-height: 0.9;
      margin-bottom: -0.25rem;
    }
  }

  .hero__h1 {
    font-family: var(--display); font-weight: 400;
    font-size: clamp(2.625rem, 11.5vw, 8.25rem);
    line-height: 0.95; letter-spacing: -0.03em;
    color: var(--bone);
    text-wrap: balance;
    max-width: 15ch;
    margin-top: clamp(0.5rem, 3.25vw, 1.25rem);
  }
  @media (min-width: 960px) { .hero__h1 { max-width: 12ch; margin-top: 0; } }
  .hero__h1 .it { font-style: italic; color: var(--plaster); font-weight: 400; }
  .hero__h1 .period { color: var(--pink); }

  .hero__lede {
    max-width: 52ch;
    margin-top: clamp(-4.5rem, -12vw, -2rem);
    margin-bottom: clamp(2rem, 12vw, 4.5rem);
    font-family: var(--display); font-weight: 400;
    font-size: clamp(1rem, 2.1vw, 1.375rem); line-height: 1.5;
    color: var(--plaster);
    text-wrap: pretty;
  }
  @media (min-width: 960px) { .hero__lede { line-height: 1.45; margin-top: 0; margin-bottom: 0; } }
  .hero__lede em { font-style: italic; color: var(--mustard); font-family: var(--display); }

  .hero__row {
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(0.875rem, 2.5vw, 1.5rem);
  }
  @media (min-width: 960px) {
    .hero__row { flex-direction: row; align-items: center; justify-content: flex-start; gap: clamp(1.5rem, 2.75vw, 2rem); }
  }
  .hero__row .btn {
    min-height: clamp(2.5rem, 5.5vw, 3rem);
    padding: clamp(0.55rem, 1.8vw, 0.875rem) clamp(1.5rem, 4vw, 2rem);
  }
  .hero__row .btn--primary { margin-top: clamp(-1.25rem, -3vw, -0.5rem); }
  .hero__row .hero__note { margin-top: clamp(0.5rem, 3vw, 1.25rem); }
  @media (min-width: 960px) {
    .hero__row .btn--primary, .hero__row .hero__note { margin-top: 0; }
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 12px;
    min-height: 52px;
    padding: 16px 24px;
    font-family: var(--display); font-weight: 500; font-size: 14px;
    letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid transparent;
    transition: all .25s ease;
    cursor: pointer;
  }
  @media (min-width: 760px) { .btn { padding: 18px 28px; } }
  .btn--primary { background: var(--mustard); color: var(--night); }
  .btn--primary:hover { background: var(--pink); box-shadow: 0 0 30px rgba(255,106,148,0.45); }
  .btn--ghost { color: var(--bone); border-color: rgba(238,218,176,0.35); }
  .btn--ghost:hover { border-color: var(--bone); background: rgba(238,218,176,0.05); }

  /* hand-scrawled "tonight" note — not a card, not bordered */
  .hero__note {
    display: inline-flex; flex-direction: column; gap: 2px;
    transform: rotate(-2.5deg);
    transform-origin: center;
    text-align: left;
  }
  @media (min-width: 960px) { .hero__note { transform-origin: left center; } }
  .hero__note .lbl {
    font-family: var(--display); font-style: italic; font-size: 13px;
    color: var(--bone-dim);
  }
  .hero__note .hrs {
    font-family: var(--script); font-size: 28px; color: var(--pink);
    line-height: 1; text-shadow: 0 0 14px rgba(255,106,148,0.45);
    white-space: nowrap;
  }
  @media (min-width: 760px) { .hero__note .hrs { font-size: 34px; } }
  .hero__note .dot { display:inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--lime); box-shadow: 0 0 10px var(--lime); margin-right: 6px; vertical-align: middle; transition: background .4s, box-shadow .4s; }
  .hero__note.is-closed .dot { background: var(--clay); box-shadow: 0 0 8px rgba(176,82,62,0.5); }

  /* logo floats, no box around it */
  .hero__sign {
    position: relative; z-index: 1;
    transform: rotate(-1.5deg);
    animation: flicker 7s infinite;
    width: 100%;
    max-width: clamp(20rem, 94vw, 36rem);
    margin-top: clamp(-1.25rem, -3.25vw, -0.5rem);
  }
  @media (min-width: 960px) { .hero__sign { max-width: none; margin-top: 0; } }
  .hero__sign img { width: 100%; max-width: 620px; margin: 0 auto; }
  @media (min-width: 960px) { .hero__sign img { margin-left: auto; margin-right: 0; } }
  @keyframes flicker {
    0%, 96%, 100% { filter: drop-shadow(0 0 26px rgba(255,106,148,0.5)) drop-shadow(0 0 52px rgba(41,212,232,0.2)) drop-shadow(0 30px 60px rgba(0,0,0,0.7)); }
    97% { filter: drop-shadow(0 0 8px rgba(255,106,148,0.25)) drop-shadow(0 30px 60px rgba(0,0,0,0.7)); }
    98% { filter: drop-shadow(0 0 26px rgba(255,106,148,0.5)) drop-shadow(0 0 52px rgba(41,212,232,0.2)) drop-shadow(0 30px 60px rgba(0,0,0,0.7)); }
  }

  /* hero backdrop — soft wall wash behind everything */
  .hero::before {
    content:""; position:absolute; inset:0;
    background:
      radial-gradient(600px 460px at 72% 48%, rgba(255,170,100,0.16), transparent 65%),
      radial-gradient(500px 400px at 25% 55%, rgba(212,170,78,0.07), transparent 65%);
    pointer-events: none; z-index: 0;
  }

  /* floating scribble marks around hero — agave / citrus hints, not literal */
  .scribble {
    position: absolute; z-index: 1; pointer-events: none;
    font-family: var(--script); color: var(--clay);
    opacity: 0.35;
  }
  .scribble.s1 { top: 18%; left: 6%; font-size: 22px; transform: rotate(-18deg); color: var(--mustard); opacity: 0.5; }
  .scribble.s2 { bottom: 20%; right: 8%; font-size: 20px; transform: rotate(8deg); color: var(--pink); opacity: 0.45; }
  @media (max-width: 960px) { .scribble { display: none; } }

  /* ————————————————————————————— BRAND MARQUEE */
  .marquee {
    position: relative;
    margin: 24px 0;
    padding: 20px 0;
    background: linear-gradient(180deg, rgba(38,26,16,0.92), rgba(26,18,9,0.92));
    border-top: 1px solid rgba(238,218,176,0.22);
    border-bottom: 1px solid rgba(238,218,176,0.22);
    box-shadow:
      0 14px 30px -14px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(238,218,176,0.06);
  }
  @media (min-width: 760px) { .marquee { margin: 36px 0; padding: 26px 0; } }
  .marquee__clip { overflow: hidden; }
  .marquee__lbl { display: none; }
  .marquee__track {
    display: flex; gap: 48px;
    animation: slide 40s linear infinite;
    width: max-content;
    align-items: center;
  }
  @media (min-width: 760px) { .marquee__track { gap: 64px; } }
  .marquee__track:hover { animation-play-state: paused; }
  .marquee__item {
    font-family: var(--display); font-weight: 400;
    font-size: 17px; color: var(--plaster);
    white-space: nowrap;
    display: flex; align-items: baseline; gap: 10px;
  }
  @media (min-width: 760px) { .marquee__item { font-size: 22px; } }
  .marquee__item em {
    font-family: var(--script); font-style: normal;
    font-size: 1.35em;
    color: var(--mustard);
  }
  .marquee__item.p em { color: var(--pink); }
  .marquee__item.c em { color: var(--cyan); }
  .marquee__item.l em { color: var(--lime); }
  .marquee__item .r {
    font-style: italic; font-size: 0.7em; color: var(--bone-dim);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .marquee__dot {
    flex: 0 0 auto;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--mustard); opacity: 0.6;
  }
  @keyframes slide {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .carta {
    padding: 64px 20px 48px;
    max-width: 1440px; margin: 0 auto;
  }
  @media (min-width: 760px) { .carta { padding: 120px 64px 100px; } }

  .carta__head {
    display: grid; grid-template-columns: 1fr; gap: 18px;
    align-items: end;
    margin-bottom: 32px;
    padding-bottom: 22px;
    border-bottom: 1px dashed rgba(238,218,176,0.25);
  }
  @media (min-width: 760px) {
    .carta__head { grid-template-columns: 1fr auto; gap: 40px; margin-bottom: 56px; padding-bottom: 28px; }
  }

  .carta__h {
    font-family: var(--display); font-weight: 400;
    font-size: 28px;
    line-height: 1; color: var(--bone);
    letter-spacing: -0.015em;
    text-wrap: balance;
  }
  @media (min-width: 760px) { .carta__h { font-size: clamp(44px, 5.5vw, 78px); line-height: 0.95; } }
  .carta__h .s { font-family: var(--script); color: var(--mustard); font-size: 1.08em; line-height: 0.85; }
  .carta__h .it { font-style: italic; color: var(--plaster); }

  .carta__meta {
    display: flex; flex-direction: column; gap: 4px;
    font-family: var(--display); font-style: italic; font-size: 14px;
    color: var(--bone-dim);
    text-align: left;
  }
  .carta__meta b { font-family: var(--script); font-style: normal; font-weight: 400; color: var(--pink); font-size: 24px; line-height: 1.05; white-space: normal; }
  @media (min-width: 760px) {
    .carta__meta { text-align: right; font-size: 15px; }
    .carta__meta b { font-size: 28px; white-space: nowrap; }
  }

  .drink {
    display: grid;
    grid-template-columns: 1fr auto;
    column-gap: 16px; row-gap: 4px;
    padding: 18px 0 16px;
    border-bottom: 1px dashed rgba(238,218,176,0.15);
    align-items: baseline;
  }
  .drink:last-child { border-bottom: none; }
  @media (min-width: 640px) {
    .drink { column-gap: 40px; padding: 32px 0 28px; }
  }

  .drink__name {
    font-family: var(--script);
    font-size: 30px;
    line-height: 0.98;
    color: var(--bone);
  }
  @media (min-width: 640px) { .drink__name { font-size: clamp(48px, 5.5vw, 72px); line-height: 0.9; } }
  .drink__name.m { color: var(--mustard); }
  .drink__name.p { color: var(--pink); }
  .drink__name.c { color: var(--cyan); }
  .drink__name.l { color: var(--lime); }
  .drink__name.k { color: var(--clay); }

  .drink__body {
    margin-top: 6px;
    max-width: 580px;
    font-family: var(--display); font-weight: 400;
    font-size: 14.5px; line-height: 1.5; color: var(--plaster);
  }
  @media (min-width: 760px) { .drink__body { margin-top: 10px; font-size: 17px; } }
  .drink__body .ing {
    font-style: italic; color: var(--bone-dim);
    display: block; margin-top: 4px; font-size: 13px;
  }
  @media (min-width: 760px) { .drink__body .ing { font-size: 14.5px; margin-top: 6px; } }

  .drink__price {
    font-family: var(--display); font-weight: 500;
    font-size: 17px; color: var(--mustard);
    white-space: nowrap; align-self: baseline;
  }
  @media (min-width: 760px) { .drink__price { font-size: 22px; } }

  .carta__full {
    display: inline-block;
    margin-top: clamp(1.75rem, 5vw, 3rem);
    font-family: var(--display); font-style: italic;
    font-size: clamp(1rem, 2.1vw, 1.35rem);
    color: var(--mustard);
    border-bottom: 1px solid currentColor;
    padding-bottom: 3px;
    transition: color .2s ease, letter-spacing .2s ease;
  }
  .carta__full:hover { color: var(--pink); letter-spacing: 0.02em; }
  .carta__full span { display: inline-block; transition: transform .25s ease; }
  .carta__full:hover span { transform: translateX(4px); }

  /* ————————————————————————————— THE LETTER */
  .letter {
    position: relative;
    padding: clamp(3.5rem, 10vw, 7rem) clamp(1rem, 4vw, 4rem);
    max-width: 980px; margin: 0 auto;
    perspective: 1200px;
  }

  /* The paper hangs from a single tack at top-center. Rotation is driven by
     JS (rAF with layered sines) so motion is truly continuous — no keyframe
     bunching at the extremes. See the Letter component. */

  .letter__wrap {
    position: relative;
  }
  .letter__card {
    opacity: 0;
    transform-origin: 50% 0;
    transition: opacity .9s ease;
    will-change: transform, opacity;
  }
  .letter__wrap.is-in .letter__card {
    opacity: 1;
  }

  .letter__card {
    position: relative;
    padding: clamp(2.5rem, 6vw, 4rem) clamp(1.5rem, 5vw, 3.25rem);
    background:
      radial-gradient(700px 260px at 80% -10%, rgba(255,106,148,0.08), transparent 60%),
      radial-gradient(600px 260px at 10% 110%, rgba(212,170,78,0.08), transparent 60%),
      linear-gradient(180deg, rgba(38,26,16,0.85), rgba(26,18,9,0.9));
    border: 1px solid rgba(212,170,78,0.22);
    filter:
      drop-shadow(0 22px 30px rgba(0,0,0,0.55))
      drop-shadow(0 2px 0 rgba(0,0,0,0.25));
  }

  /* Tack sits on the wall, not on the paper — stays put while paper sways */
  .letter__tack {
    position: absolute;
    top: -7px; left: 50%;
    transform: translateX(-50%);
    width: 16px; height: 16px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 32% 28%, #F6E2B3 0%, #D4AA4E 42%, #8B5B24 78%, #4A2A10 100%);
    box-shadow:
      0 1px 0 rgba(255,230,180,0.35),
      0 4px 6px rgba(0,0,0,0.6),
      inset -1px -2px 2px rgba(0,0,0,0.35);
    z-index: 3;
    pointer-events: none;
  }
  .letter__tack::after {
    content: '';
    position: absolute;
    left: 50%; top: 22%;
    transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(255,240,210,0.7);
    filter: blur(0.5px);
  }

  .letter__mark {
    font-family: var(--script); color: var(--mustard);
    font-size: 28px; line-height: 1; margin-bottom: 18px;
  }
  @media (min-width: 760px) { .letter__mark { font-size: 36px; margin-bottom: 24px; } }
  .letter p {
    font-family: var(--display); font-weight: 400;
    font-size: 16.5px;
    line-height: 1.55; color: var(--plaster);
    text-wrap: pretty;
  }

<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "mustard-clay",
  "headline": "only-in-bryan",
  "flicker": true
}/*EDITMODE-END*/;

const PALETTES = {
  'mustard-clay': { mustard: '#D4AA4E', clay: '#B0523E', pink: '#FF6A94', label: 'Mustard + clay (default)' },
  'amber-rust':   { mustard: '#E8A44C', clay: '#8E3A24', pink: '#FF6A94', label: 'Amber + rust' },
  'bone-pink':    { mustard: '#E6D6B2', clay: '#B0523E', pink: '#FF3D7F', label: 'Bone + hot pink' },
  'lime-clay':    { mustard: '#B8C451', clay: '#B0523E', pink: '#FF6A94', label: 'Agave lime + clay' },
};

// —— Bar hours (Central Time). 0=Sun … 6=Sat. close > 1440 means crosses midnight.
const SCHEDULE = {
  0: { open: 19*60, close: 22*60 },   // Sun  7pm–10pm
  1: null,                             // Mon  closed
  2: { open: 19*60, close: 24*60 },   // Tue  7pm–12am
  3: { open: 19*60, close: 24*60 },   // Wed  7pm–12am
  4: { open: 19*60, close: 24*60 },   // Thu  7pm–12am
  5: { open: 19*60, close: 26*60 },   // Fri  7pm–2am
  6: { open: 19*60, close: 26*60 },   // Sat  7pm–2am
};
const DAY_ABBR = ['sun','mon','tue','wed','thu','fri','sat'];

function nowCentral() {
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Chicago',
    weekday: 'short', hour: '2-digit', hour12: false, minute: '2-digit',
  }).formatToParts(new Date());
  const p = Object.fromEntries(parts.map(x => [x.type, x.value]));
  const map = { Sun:0, Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6 };
  return { day: map[p.weekday], minutes: parseInt(p.hour,10)*60 + parseInt(p.minute,10) };
}

function fmtTime(min) {
  const h24 = Math.floor(min/60) % 24;
  const m = min % 60;
  const ap = h24 >= 12 ? 'pm' : 'am';
  const h = h24 % 12 || 12;
  return m === 0 ? `${h} ${ap}` : `${h}:${String(m).padStart(2,'0')} ${ap}`;
}

function computeStatus() {
  const { day, minutes } = nowCentral();

  // Still inside yesterday's late-night window?
  const yIdx = (day + 6) % 7;
  const y = SCHEDULE[yIdx];
  if (y && y.close > 24*60 && minutes < y.close - 24*60) {
    return { open: true, activeDay: yIdx, label: 'open now', hrs: `until ${fmtTime(y.close - 24*60)}` };
  }

  const today = SCHEDULE[day];
  if (today) {
    const closeDisplay = today.close > 24*60 ? today.close - 24*60 : today.close;
    if (minutes < today.open) {
      return { open: false, activeDay: day, label: 'open tonight', hrs: `${fmtTime(today.open)} · ${fmtTime(closeDisplay)}` };
    }
    if (minutes < (today.close > 24*60 ? 24*60 : today.close)) {
      return { open: true, activeDay: day, label: 'open now', hrs: `until ${fmtTime(closeDisplay)}` };
    }
  }

  // Closed now — find next open day
  for (let i = 1; i <= 7; i++) {
    const d = (day + i) % 7;
    if (SCHEDULE[d]) {
      const when = i === 1 ? 'tomorrow' : DAY_ABBR[d];
      return { open: false, activeDay: day, label: 'closed today', hrs: `back ${when} · ${fmtTime(SCHEDULE[d].open)}` };
    }
  }
  return { open: false, activeDay: day, label: 'closed', hrs: '' };
}

function useBarStatus() {
  const [st, setSt] = useState(computeStatus);
  useEffect(() => {
    const id = setInterval(() => setSt(computeStatus()), 30_000);
    return () => clearInterval(id);
  }, []);
  return st;
}

function Topbar() {

    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <div className={`topbar ${scrolled ? 'is-scrolled' : ''}`}>

        <a href="#carta">The List</a>
        <a href="#letter">The Room</a>
        <a href="#door">Find Us</a>

    </div>
  );
}

  return (

}

function Carta() {
  const drinks = [
    { name: 'Diablo del Playa',             color: 'p', price: '$14',
      desc: 'Slow heat, long finish. The one that sells itself.',

      ))}

function Letter() {
  const ref = useRef(null);
  const cardRef = useRef(null);
  const [inView, setInView] = useState(false);

  useEffect(() => {
    if (!ref.current) return;
    // Trigger ~80% of a viewport before the letter enters the viewport, so it
    // starts swaying roughly midway through the drinks list above.
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setInView(true); obs.disconnect(); }
    }, { threshold: 0, rootMargin: '0px 0px 80% 0px' });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);

  // Continuous rAF-driven sway — sum of three sines at incommensurate
  // periods so the combined angular velocity never simultaneously hits zero.
  // No keyframe bunching, no pauses at the extremes, just drift.
  useEffect(() => {
    if (!inView) return;
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (prefersReduced) return;
    const card = cardRef.current;
    if (!card) return;
    const t0 = performance.now();
    let raf;
    const tick = (now) => {
      const t = (now - t0) / 1000;
      const r =
        1.15 * Math.sin((2 * Math.PI * t) / 6.2) +
        0.42 * Math.sin((2 * Math.PI * t) / 4.1 + 1.3) +
        0.22 * Math.sin((2 * Math.PI * t) / 2.73 + 0.6);
      card.style.transform = `rotate(${r.toFixed(3)}deg)`;
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [inView]);

  return (
    <section id="letter" className="letter" ref={ref}>
      <div className={`letter__wrap ${inView ? 'is-in' : ''}`}>
        <span className="letter__tack" aria-hidden="true" />
        <div className="letter__card" ref={cardRef}>
          <div className="letter__mark">A note —</div>
          <p>

            <em> Not anymore.</em> Citrus &amp; Salt is the only one in Bryan —
            built slowly, on purpose, for the people in this town who already know

            A third of Bryan is Mexican or Mexican-American. Four generations of
            families who carried recipes, bottles, and better judgment about tequila
            than most bars in Austin have. <span className="pink">We built this for you first.</span>
          </p>
          <p>
            Behind the bar is <b>Dustin Batson</b> — the same hands most of Main
            Street already knows. Ask what&rsquo;s rotating. Ask for something neat.
            Ask him to pick.
          </p>
          <div className="letter__sign">
            — The owners · <b>Downtown Bryan</b> · April 2026
          </div>
        </div>
      </div>
    </section>
  );
}

function Door({ status, openChooser }) {
  const rowTag = (days) => {
    if (!days.includes(status.activeDay)) return <span></span>;
    if (!SCHEDULE[status.activeDay]) return <span className="tag">today</span>;
    if (status.open) return <span className="tag now">open now</span>;
    return <span className="tag">tonight</span>;
  };

  return (
    <section id="door" className="door">
      <div className="door__addr">
        <span className="s">come see us —</span>
        121 N Main St<br/>
        <span className="city">Bryan, Texas</span>
      </div>
      <a href="tel:+18322854598" className="door__phone" onClick={(e) => { e.preventDefault(); openChooser('phone'); }}>(832) 285&middot;4598</a>

      <div className="door__hours">
        <div><span className="day">Monday</span><span className="t">closed</span>{rowTag([1])}</div>
        <div><span className="day">Tue — Thu</span><span className="t">7 pm — 12 am</span>{rowTag([2,3,4])}</div>
        <div><span className="day">Fri — Sat</span><span className="t">7 pm — 2 am</span>{rowTag([5,6])}</div>
        <div><span className="day">Sunday</span><span className="t">7 pm — 10 pm</span>{rowTag([0])}</div>
      </div>

      <div className="door__actions">
        <a href="https://maps.google.com/?q=121+N+Main+St+Bryan+TX" target="_blank" rel="noreferrer" className="btn btn--primary" onClick={(e) => { e.preventDefault(); openChooser('dir'); }}>Directions →</a>
      </div>
    </section>
  );
}

function Foot() {
  return (
    <footer>
      <span>&copy; 2026 Citrus &amp; Salt · 121 N Main St · Bryan, TX · 21+</span>
      <span className="vice">
        P.S. — <b>Vice</b> is our nightclub upstairs. <a href="https://vicedowntownbryan.com">vicedowntownbryan.com ↗</a>
      </span>{' '}
    </footer>
  );
}

function Tweaks({ state, setState, open }) {
  if (!open) return null;
  return (
    <div className="tweaks open">
      <h4>Tweaks</h4>
      <label>
        <span>Palette</span>
        <div className="row" style={{marginBottom:8}}>
          {Object.entries(PALETTES).map(([k, v]) => (
            <div key={k}
              className={`sw ${state.palette === k ? 'sel' : ''}`}
              style={{background: `linear-gradient(135deg, ${v.mustard} 0 50%, ${v.clay} 50% 100%)`}}
              onClick={() => setState({...state, palette: k})} />
          ))}
        </div>
        <select value={state.palette} onChange={e => setState({...state, palette: e.target.value})}>
          {Object.entries(PALETTES).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
      </label>
      <label>
        <span>Headline</span>
        <select value={state.headline} onChange={e => setState({...state, headline: e.target.value})}>
          <option value="only-in-bryan">The only tequila bar in Bryan.</option>
          <option value="zero-to-one">Zero to one. Bryan&rsquo;s first tequila bar.</option>
          <option value="on-main">Tequila, finally on Main.</option>
        </select>
      </label>
      <label>
        <span>Neon flicker</span>
        <select value={state.flicker ? 'on' : 'off'} onChange={e => setState({...state, flicker: e.target.value === 'on'})}>
          <option value="on">On</option>
          <option value="off">Off (steady glow)</option>
        </select>
      </label>
    </div>
  );
}

function Marquee() {
  const items = [
    { brand: 'Fortaleza',        region: 'Tequila, Jalisco',     cls: '' },
    { brand: 'Siete Leguas',     region: 'Atotonilco',           cls: 'p' },
    { brand: 'Del Maguey',       region: 'Oaxaca',               cls: 'c' },
    { brand: 'Tapatío',         region: 'Arandas',              cls: 'l' },
    { brand: 'Cláse Azul',        region: 'Los Altos',            cls: '' },
    { brand: 'Vago',             region: 'Mezcal · Oaxaca',      cls: 'p' },
    { brand: 'ArteNOM',          region: '— single estate',      cls: 'c' },
    { brand: 'Mijenta',          region: 'Jalisco',              cls: '' },
    { brand: 'Don Fulano',       region: 'Los Altos',            cls: 'l' },
    { brand: 'Tears of Llorona', region: 'Extra Añejo',          cls: 'p' },
    { brand: 'El Tesoro',        region: 'Arandas',              cls: '' },
    { brand: 'Ilegal',           region: 'Mezcal',               cls: 'c' },
    { brand: 'G4',               region: 'Los Altos',            cls: 'l' },
    { brand: 'Casamigos',        region: 'Jalisco',              cls: '' },
    { brand: 'Lalo',             region: 'Arandas',              cls: 'p' },
  ];
  const loop = [...items, ...items];
  return (
    <div className="marquee">
      <span className="marquee__lbl">On the shelf — 100+ more</span>
      <div className="marquee__clip">
        <div className="marquee__track">
          {loop.map((it, i) => (
            <span key={i} className={`marquee__item ${it.cls}`}>
              <em>{it.brand}</em>
              <span className="r">{it.region}</span>
              <span className="marquee__dot" aria-hidden="true" />
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

function Burger({ openChooser }) {
  const [open, setOpen] = useState(false);
  useEffect(() => {
    document.body.style.overflow = open ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [open]);
  const close = () => setOpen(false);
  return (
    <>
      <button
        className={`burger ${open ? 'open' : ''}`}
        aria-label={open ? 'Close menu' : 'Open menu'}
        onClick={() => setOpen(o => !o)}
      >
        <span /><span /><span />
      </button>
      <nav className={`menu ${open ? 'open' : ''}`} aria-hidden={!open}>
        <a href="#carta" onClick={close}><span className="n">01</span> The List</a>
        <a href="#letter" onClick={close}><span className="n">02</span> The Room</a>
        <a href="#door" onClick={close}><span className="n">03</span> Find Us</a>
        <a href="#door" onClick={close}><span className="n">04</span> Hours</a>
        <span className="spark">— salud</span>
        <div className="tel">
          <span>Call the bar</span>
          <a href="tel:+18322854598" onClick={(e) => { e.preventDefault(); close(); openChooser('phone'); }}><b>(832) 285&middot;4598</b></a>
        </div>
      </nav>
    </>
  );
}

function StickyBar() {
  return (
    <div className="stickybar">
      <a className="call" href="tel:+18322854598">Call</a>
      <a className="dir" href="https://maps.google.com/?q=121+N+Main+St+Bryan+TX" target="_blank" rel="noreferrer">Directions →</a>
    </div>
  );
}

const CHOOSER_CONFIG = {
  phone: {
    title: 'Reach us —',
    options: [
      { label: 'Call',  href: 'tel:+18322854598' },
      { label: 'Text',  href: 'sms:+18322854598' },
    ],
  },
  dir: {
    title: 'Get directions —',
    options: [
      { label: 'Apple Maps',  href: 'https://maps.apple.com/?q=121+N+Main+St+Bryan+TX', external: true },
      { label: 'Google Maps', href: 'https://maps.google.com/?q=121+N+Main+St+Bryan+TX', external: true },
    ],
  },
};

function Chooser({ kind, onClose }) {
  useEffect(() => {
    if (!kind) return;
    const onKey = (e) => e.key === 'Escape' && onClose();
    document.addEventListener('keydown', onKey);
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => {
      document.removeEventListener('keydown', onKey);
      document.body.style.overflow = prev;
    };
  }, [kind, onClose]);

  if (!kind) return null;
  const cfg = CHOOSER_CONFIG[kind];

  return (
    <div className="chooser" onClick={onClose} role="dialog" aria-modal="true">
      <div className="chooser__card" onClick={(e) => e.stopPropagation()}>
        <div className="chooser__title">{cfg.title}</div>
        <div className="chooser__opts">
          {cfg.options.map((o) => (
            <a
              key={o.label}
              href={o.href}
              {...(o.external ? { target: '_blank', rel: 'noreferrer' } : {})}
              className="chooser__opt"
              onClick={onClose}
            >
              {o.label}
            </a>
          ))}
        </div>
        <button className="chooser__cancel" onClick={onClose}>Cancel</button>
      </div>
    </div>
  );
}

function App() {
  const [state, setState] = useState(TWEAK_DEFAULTS);
  const [open, setOpen] = useState(false);
  const [chooserKind, setChooserKind] = useState(null);
  const status = useBarStatus();
  const openChooser = (kind) => setChooserKind(kind);
  const closeChooser = () => setChooserKind(null);

  useEffect(() => {
    function onMsg(e) {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type: '__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  useEffect(() => {
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: state}, '*');
  }, [state]);

  useEffect(() => {
    const p = PALETTES[state.palette] || PALETTES['mustard-clay'];
    document.documentElement.style.setProperty('--mustard', p.mustard);
    document.documentElement.style.setProperty('--clay', p.clay);
    document.documentElement.style.setProperty('--pink', p.pink);

    const id = 'fx-fl'; let s = document.getElementById(id);
    if (!s) { s = document.createElement('style'); s.id = id; document.head.appendChild(s); }
    s.textContent = state.flicker ? '' : `
      .hero__sign { animation: none !important; filter: drop-shadow(0 0 26px rgba(255,106,148,0.4)) drop-shadow(0 0 52px rgba(41,212,232,0.18)) drop-shadow(0 30px 60px rgba(0,0,0,0.7)) !important; }
    `;
  }, [state]);

  return (
    <>
      <Topbar />
      <Burger openChooser={openChooser} />
      <Hero headline={state.headline} status={status} openChooser={openChooser} />
      <Marquee />
      <Carta />
      <Letter />
      <Door status={status} openChooser={openChooser} />
      <Foot />
      <Tweaks state={state} setState={setState} open={open} />
      <Chooser kind={chooserKind} onClose={closeChooser} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
